<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">Bootstrap Layout Demo</h1>

    <div class="row">

        <div class="col-lg-4 col-12 bg-light p-4 mb-3">
            <h4 class="text-primary">Column 1</h4>
            <p>This column stacks on small screens.</p>
        </div>

        <div class="col-lg-4 col-12 bg-warning p-4 mb-3">

            <h4 class="text-center">Column 2 (Nested Grid)</h4>

            <div class="row mt-3">
                <div class="col-6 bg-info text-white p-3">
                    Sub Column 1
                </div>
                <div class="col-6 bg-secondary text-white p-3">
                    Sub Column 2
                </div>
            </div>

        </div>

        <div class="col-lg-4 col-12 bg-success text-white p-4 mb-3">
            <h4>Column 3</h4>
            <p class="mt-3">
                Responsive layout using Bootstrap grid system.
            </p>
        </div>

    </div>

</div>

</body>
</html>
